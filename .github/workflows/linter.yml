name: Lint Code Base

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  run-lint:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Holt die gesamte Historie für den Diff

      - name: Get Default Branch
        id: default-branch
        run: |
          # Ermittelt dynamisch, ob das Repo 'main' oder 'master' als Default nutzt
          DEFAULT_BR=$(git rev-parse --abbrev-ref origin/HEAD | sed 's/origin\///')
          echo "RESOLVED_BRANCH=${DEFAULT_BR:-main}" >> $GITHUB_OUTPUT

      - name: Lint Code Base
        uses: super-linter/super-linter@v7
        env:
          VALIDATE_ALL_CODEBASE: false
          # Nutzt das Ergebnis aus dem vorherigen Schritt dynamisch
          DEFAULT_BRANCH: ${{ steps.default-branch.outputs.RESOLVED_BRANCH }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
