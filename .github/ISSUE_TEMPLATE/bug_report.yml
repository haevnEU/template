name: "🐛 Bug Report"
description: File a structured bug report with all relevant context
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form as completely as possible to help isolate and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: "Current Behavior"
      description: "A clear and concise description of what the bug is."
      placeholder: "What went wrong?"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "How can we trigger this behavior? Please provide step-by-step instructions."
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "A clear and concise description of what you expected to happen."
      placeholder: "What should have happened instead?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs, Stack Traces or Error Messages"
      description: "Paste any relevant terminal output, logs, or stack traces here. They will automatically be formatted as code blocks."
      render: text
      placeholder: "e.g., java.lang.NullPointerException at..."
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: "Environment / Operating System"
      description: "Where did this issue occur?"
      options:
        - "Linux (Specify in description)"
        - "Ubuntu"
        - "Debian"
        - "OpenSUSE"
        - "macOS"
        - "Windows with WSL 2"
        - "Docker Container"
        - "Other (Specify in description)"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "Additional Context"
      description: "Any other context, related issues, or screenshots you want to add."
    validations:
      required: false